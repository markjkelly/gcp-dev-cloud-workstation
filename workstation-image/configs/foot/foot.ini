# foot terminal — Cloud Workstation
# Tokyo Night theme with DejaVu Sans Mono font
#
# Source of truth for foot config. Deployed to ~/boot/foot.ini by
# cloud-build-setup.sh (Step 13 — Deploy configs) and copied into place by
# ~/boot/06-prompt.sh on every boot.
#
# Font choice rationale: DejaVu Sans Mono is present in the base Ubuntu
# image (/usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf) so it always
# resolves on a freshly provisioned workstation with no dependency on
# Nix-packaged fonts or Operator Mono deployment. JetBrains Mono is NOT
# installed on this host — configuring it causes foot to fall back to
# Noto Sans (proportional), emitting the "font does not appear to be
# monospace" warning. See F-0094.

[main]
font=DejaVu Sans Mono:size=14
dpi-aware=no
pad=8x8

[scrollback]
lines=10000

[colors-dark]
# Tokyo Night
background=1a1b26
foreground=c0caf5

## Normal colors
regular0=15161e
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=a9b1d6

## Bright colors
bright0=414868
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=c0caf5

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

[tweak]
