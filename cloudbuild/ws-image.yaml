# Cloud Build pipeline: build and push custom Cloud Workstation Docker image.
# Triggered on push to main in markjkelly/cloud-workstation.
# The connected repo is automatically checked out to /workspace — no clone step needed.
#
# _AR_PROJECT is the GCP project that owns the Artifact Registry repo.
# It is set by the Cloud Build trigger in foundation/0-bootstrap/cloudbuild.tf.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$_AR_PROJECT/workstation-images/dev-workstation:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$_AR_PROJECT/workstation-images/dev-workstation:latest
      - workstation-image
substitutions:
  _AR_PROJECT: 'prj-c-workstations-j68o'
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
timeout: 7200s
images:
  - us-central1-docker.pkg.dev/$_AR_PROJECT/workstation-images/dev-workstation:$SHORT_SHA
  - us-central1-docker.pkg.dev/$_AR_PROJECT/workstation-images/dev-workstation:latest
